<!DOCTYPE html>
<html>

<head>
    <meta charset="utf-8">
    <meta name="description" content="無聊做的小遊戲">
    <meta name="keywords" content="小遊戲">
    <title>Tian's Games</title>
    <link href='http://fonts.googleapis.com/css?family=Open+Sans' rel='stylesheet' type='text/css'>
    <link rel="stylesheet" href="styles/style.css" type="text/css">
    <link rel="stylesheet" href="styles/games.css" type="text/css">
    <link rel="shortcut icon" href="images/favicon-logo-2.ico" type="image/x-icon">

<body>
    <header>
        <!--標題區-->
        <div class="hearder_bg" style="background-color:rgb(255, 247, 247); height:80px; position: relative;">
            <div class="header_div">
                <div class="logo">&nbsp;'Games&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;'</div>

                <!-- 網頁的連結選項 -->
                <nav id="title-nav">
                </nav>
                <script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
                <script src="scripts/nav_title.js"></script>
                <!-- 網頁的連結選項 -->
            </div>
        </div>
    </header>

    <article style="position: relative;">
        <!--主內容區 獨立完整的內容-->
        <div class="article_bg" style="background-color:rgb(255, 255, 255); height:800px; position: relative;">
            <section class="Main">
                <!-- 文章大綱 -->
                <div class="aboutMe_content" style="display: flex;">
                    <div style="height:500px; width:30%;">
                        <p
                            style="margin-top:0; font-size:30px; font-family:Impact, Haettenschweiler, 'Arial Narrow Bold', sans-serif;">
                            Games
                        </p>
                    </div>
                    
                    <div style="height:500px; width:70%; border-style: solid; border-width:3px;">
                        <div id="playground">
                            <div class="box1">
                                <div class="nest">a</div>
                                <div class="nest">b</div>
                                <div class="nest">c</div>
                            </div>
                            <div>2</div>
                            <div>3</div>
                            <div>4</div>
                            <div>5</div>
                            <div>6</div>
                            <div>7</div>
                            <div>8</div>
                            <div>9</div>
                            <!-- <div>1</div>
                            <div>2</div>
                            <div>3</div>
                            <div>4</div>
                            <div>5</div>
                            <div>6</div>
                            <div>7</div>
                            <div>8</div>
                            <div>9</div> -->
                        </div>
                    </div>
                </div>
            </section>
        </div>
    </article>

    <script src="scripts/main.js"></script> <!-- 放底部是防止有element還未顯示而發生錯誤 -->
    <script src="scripts/slide_img.js"></script>

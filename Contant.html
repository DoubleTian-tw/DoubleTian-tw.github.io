<!DOCTYPE html>
<html>

<head>
    <meta charset="utf-8">
    <meta name="description" content="田的網站">
    <meta name="keywords" content="主頁面">
    <!-- <meta charset="ISO-8859-1"> 日語系會發生錯誤 -->
    <title>Contant Tian</title>
</head>
<link href='http://fonts.googleapis.com/css?family=Open+Sans' rel='stylesheet' type='text/css'>
<link rel="stylesheet" href="styles/style.css" type="text/css">
<link rel="stylesheet" href="styles/slide_img.css" type="text/css">
<link rel="shortcut icon" href="images/favicon-logo-2.ico" type="image/x-icon">
<link rel="icon" href="images/favicon-logo-2.ico" type="image/x-icon">

<body>
    <header>
        <!--標題區-->
        <div class="hearder_bg" style="background-color:rgb(255, 247, 247); height:80px; position: relative;">
            <div class="header_div">
                <div class="logo">&nbsp;'Contant&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;'</div>

                    <!-- 網頁的連結選項 -->
                    <nav id="title-nav">
                    </nav>
                    <script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
                    <script src="scripts/nav_title.js"></script>
                    <!-- 網頁的連結選項 -->

                </div>
        </div>
    </header>

    <article style="position: relative;">
        <!--主內容區 獨立完整的內容-->
        <div class="article_bg" style="background-color:rgb(255, 255, 255); height:800px; position: relative;">
            <section class="Main">
                <!-- 文章大綱 -->
                <div class="img-me-cut" style="position: relative; ">                    
                    <div style="position: absolute; left: 130px; top:100px; color:#fff; font-weight: bold; font-size:48px">How to</div>
                    <div style="position: absolute; left: 390px; top:100px; color:#fff; font-weight: bold; font-size:48px">contant</div>
                    <img src="images/me-2.jpg" alt="Content me." style="margin-top:-0%; width:100%;">                
                </div>
                <div class="aboutMe_content" style="display: flex;">
                    <div style="height:500px; width:50%;">                        
                        <p class="title_font" style="margin-top:0; ">
                            <u>Contant</u>
                        </p>
                        <p >&nbsp;
                            <img class="content-logo"; src="images/flag-for-taiwan.png" ; alt="Tawian flag" ;/>
                            Taiwan
                        </p>
                        <p>&nbsp;
                            <img class="content-logo"; src="images/logo-for-hsinchu.png"; alt="Hsinchu logo";>
                            Hsinchu
                        </p>
                        <p>&nbsp;
                            <img class="content-logo"; src="images/mobile-phone.png"; alt="Mobile phone";>
                            09-12345678
                        </p>
                        <p>&nbsp;
                            <img class="content-logo"; src="images/e-mail-fb.png"; alt="E-mail">
                            <a href="mailto:q135135c@yahoo.com.tw">q135135c@yahoo.com.tw</a>
                        </p>
                    </div>
                    <div style="height:500px; width:50%; ">
                        <div style="height:90px;"></div>
                        <div>
                            <label id="content_userlabel">Enter Your Name</label>
                            <input type="text" id="content_userTextBox" name="user_name">

                            <label id="content_userlabel">Enter Your E-mail</label>
                            <input type="email" id="content_userTextBox" name="user_email"
                            pattern="@" list="defaultEmails">
                            <datalist id="defaultEmails">
                                <option value="@yahoo.com.tw">
                                <option value="@gmail.com">
                            </datalist>

                            <label id="content_userlabel">Message</label>
                            <textarea id="content_userTextArear" name="user_message" 
                            maxlength="1000" style="width:300px; height:150px; resize:none;">Enter your message</textarea>
                        </div>
                    </div>
                </div>               
            </section>
        </div>
    </article>

    <script src="scripts/main.js"></script> <!-- 放底部是防止有element還未顯示而發生錯誤 -->
    <script src="scripts/slide_img.js"></script>
    <!-- <script src="scripts/content.js"></script> -->

</body>

</html>
